    <script>
        
        async function fetchThoughts() {
            try {
                const query = '*[_type == "thought"] | order(_createdAt desc)';
                const res = await fetch(getSanityUrl(query));
                const { result: thoughts } = await res.json();
                
                const list = document.getElementById('thoughtsList');
                if (!thoughts || thoughts.length === 0) {
                    list.innerHTML = '<div class="list-item"><p class="item-desc">No thoughts yet.</p></div>';
                    return;
                }
                list.innerHTML = thoughts.map(t => `
                    <div class="list-item">
                        <p class="item-desc">"${t.content}"</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error fetching thoughts:", err);
            }
        }
        fetchThoughts();
    </script>
