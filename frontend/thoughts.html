<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subrato. | Thoughts</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-circle">s</div>
            journey
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="career.html">Career</a>
            <a href="blogs.html">Blogs</a>

            <a href="postcards.html">Postcards</a>
            <a href="timeline.html">Timeline</a>
            <a href="contact.html">Contact</a>

        </div>
    </nav>
    
    <main class="page-list">
        <div>
            <span class="overline">Thoughts & Fragments</span>
            <h2 class="section-title">Small things, <em>kept.</em></h2>
            <p style="color: var(--text-muted); margin-bottom: 3rem; font-weight: 300;">Half-finished sentences, observations, questions I haven’t answered yet.</p>
            
            <div class="item-list" id="thoughtsList">
                <div class="list-item">
                    <p class="item-desc">Loading thoughts...</p>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div>
            <div class="footer-logo">journey.</div>
            <div class="footer-desc">A slow archive of a life still being written.</div>
        </div>
        <div class="footer-credits">
            © 2026 — MADE WITH PATIENCE
        </div>
    </footer>
    <script>
        
        async function fetchThoughts() {
            try {
                const res = await fetch(`${API_URL}/api/thoughts`);
                const thoughts = await res.json();
                const list = document.getElementById('thoughtsList');
                if (thoughts.length === 0) {
                    list.innerHTML = '<div class="list-item"><p class="item-desc">No thoughts yet.</p></div>';
                    return;
                }
                list.innerHTML = thoughts.map(t => `
                    <div class="list-item">
                        <p class="item-desc">"${t.content}"</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error fetching thoughts:", err);
            }
        }
        fetchThoughts();
    </script>
</body>
</html>
