<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subrato. | Postcards</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Subrato.</a>
        
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="career.html">Career</a>
            <a href="blogs.html">Blogs</a>
            <a href="thoughts.html">Thoughts</a>
            <a href="postcards.html" class="active">Postcards</a>
            <a href="timeline.html">Timeline</a>
            <a href="contact.html">Contact</a>

        </div>
    </nav>
    
    <main class="page-gallery">
        <div>
            <span class="overline">Postcards</span>
            <h2 class="section-title">Places I’ve kept <br><em>in a shoebox.</em></h2>
            
            <div class="gallery-grid" id="postcardsGrid">
                <p style="color: var(--text-muted);">Loading postcards...</p>
            </div>
        </div>
    </main>
    
    <footer>
        <div>
            <div class="footer-logo">Subrato.</div>
            <div class="footer-desc">A slow archive of a life still being written.</div>
        </div>
        <div class="footer-credits">
            © 2026 — MADE WITH PATIENCE
        </div>
    </footer>
    <script>
        
        async function fetchPostcards() {
            try {
                const res = await fetch(`${API_URL}/api/postcards`);
                const postcards = await res.json();
                const grid = document.getElementById('postcardsGrid');
                if (postcards.length === 0) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">No postcards yet.</p>';
                    return;
                }
                grid.innerHTML = postcards.map(p => `
                    <div class="gallery-item" style="background-image: url('${p.image_url}');"></div>
                `).join('');
            } catch (err) {
                console.error("Error fetching postcards:", err);
            }
        }
        fetchPostcards();
    </script>
</body>
</html>
