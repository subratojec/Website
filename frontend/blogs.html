<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subrato. | Blogs</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Subrato.</a>
        
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="career.html">Career</a>
            <a href="blogs.html" class="active">Blogs</a>
            <a href="thoughts.html">Thoughts</a>
            <a href="postcards.html">Postcards</a>
            <a href="timeline.html">Timeline</a>
            <a href="contact.html">Contact</a>

        </div>
    </nav>
    
    <main class="page-list">
        <div style="width: 100%;">
            <div style="margin-bottom: 4rem;">
                <h1 style="font-family: var(--font-serif); font-size: 2.5rem; color: var(--text-main); margin-bottom: 0.5rem;">The Blogs</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Code, Architecture, and Lessons from the Journey.</p>
            </div>
            
            <div id="essayList" style="display: flex; flex-direction: column; width: 100%;">
                <div style="color: var(--text-muted); font-size: 1.1rem;">Loading blogs...</div>
            </div>
        </div>
    </main>
    
    <footer>
        <div>
            <div class="footer-logo">Subrato.</div>
            <div class="footer-desc">A slow archive of a life still being written.</div>
        </div>
        <div class="footer-credits">
            © 2026 — MADE WITH PATIENCE
        </div>
    </footer>
    <script>
        async function fetchJournal() {
            try {
                const res = await fetch(`${API_URL}/api/blogs`);
                const entries = await res.json();
                const list = document.getElementById('essayList');
                if (entries.length === 0) {
                    list.innerHTML = '<div style="color: var(--text-muted); font-size: 1.1rem;">No blogs published yet.</div>';
                    return;
                }
                
                list.innerHTML = entries.map(entry => {
                    const snippet = entry.content.replace(/[#_*>`]/g, '').substring(0, 150) + (entry.content.length > 150 ? '...' : '');
                    return `
                    <div style="cursor: pointer; transition: transform 0.2s; padding: 2rem; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 1.5rem; background-color: rgba(255,255,255,0.02);" onmouseover="this.style.transform='translateY(-4px)'; this.style.borderColor='var(--accent-color)'" onmouseout="this.style.transform='translateY(0)'; this.style.borderColor='var(--border-color)'" onclick="window.location.href='blog.html?id=${entry.id}'">
                        <div style="font-size: 0.85rem; color: var(--accent-color); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">${entry.date}</div>
                        <h3 style="font-family: var(--font-serif); font-size: 2.2rem; margin-bottom: 1rem; color: var(--text-main); line-height: 1.2;">${entry.title}</h3>
                        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.6;">${snippet}</p>
                        <div style="margin-top: 1.5rem; font-size: 0.95rem; font-weight: 500; color: var(--text-main);">Read article →</div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error("Error fetching blogs", err);
            }
        }
        fetchJournal();
    </script>
</body>
</html>
